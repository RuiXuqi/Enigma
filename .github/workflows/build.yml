name: Build and Upload

on:
  push:
  pull_request:
  schedule:
    - cron: '0 0 */30 * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'zulu'

      - uses: actions/checkout@v7

      - run: chmod +x gradlew

      - name: Build with additional version suffix
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION_EXPR=$(grep '^enigma_version=' gradle.properties)
          # add suffix to version expression
          ./gradlew build -P${VERSION_EXPR}-${SHORT_SHA} --stacktrace

      - uses: actions/upload-artifact@v7
        with:
          path: |
            enigma*/build/libs/*.jar

      - uses: Juuxel/publish-checkstyle-report@v3
        if: ${{ failure() }}
        with:
          reports: |
            enigma*/build/reports/checkstyle/*.xml